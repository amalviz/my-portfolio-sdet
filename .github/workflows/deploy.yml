name: Build and Deploy to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  # Defaults; override in repo Settings → Secrets and variables → Actions
  AWS_REGION: eu-north-1
  S3_BUCKET: my-portfolio-av

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate AWS and S3 config
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "::error::AWS_ACCESS_KEY_ID secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::AWS_SECRET_ACCESS_KEY secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          BUCKET="${{ vars.S3_BUCKET || env.S3_BUCKET }}"
          REGION="${{ vars.AWS_REGION || env.AWS_REGION }}"
          if [ -z "$BUCKET" ]; then
            echo "::error::S3_BUCKET is not set. Add repo variable S3_BUCKET or set it in this workflow."
            exit 1
          fi
          echo "Deploying to bucket: $BUCKET (region: $REGION)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      # Deploys to bucket root: https://my-portfolio-av.s3.eu-north-1.amazonaws.com/index.html
      - name: Sync to S3
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET || env.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
          AWS_REGION: ${{ vars.AWS_REGION || env.AWS_REGION }}
        run: |
          if [ -n "$S3_PREFIX" ]; then
            S3_PATH="s3://${S3_BUCKET}/${S3_PREFIX}/"
          else
            S3_PATH="s3://${S3_BUCKET}/"
          fi
          echo "Syncing dist/ to $S3_PATH"
          aws s3 sync dist/ "$S3_PATH" --delete --cache-control "public, max-age=31536000" --exclude "index.html"
          aws s3 cp dist/index.html "${S3_PATH}index.html" --cache-control "no-cache, no-store, must-revalidate"
          echo "Deploy complete. Site: https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/index.html"
