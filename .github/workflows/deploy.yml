name: Build and Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  # Defaults; override in repo Settings → Secrets and variables → Actions
  AWS_REGION: eu-north-1
  S3_BUCKET: my-portfolio-av

jobs:
  build-and-deploy-to-ec2:
    runs-on: ubuntu-latest
    environment: prod 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION || env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

      - name: Build and Push Docker Image to ECR
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          echo "Building Docker image..."
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          echo "Tagging Docker image..."
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REPOSITORY:$IMAGE_TAG
          echo "Pushing Docker image to ECR..."
          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          # Create a temporary key file from the EC2_KEY secret
          echo "${EC2_KEY}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

          # Install Docker + AWS CLI v2 on EC2 (awscli apt pkg often missing on minimal Ubuntu)
          echo "Installing Docker and AWS CLI on EC2 instance..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem "${EC2_USER}@${EC2_HOST}" "sudo apt-get update -y && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io curl unzip && sudo systemctl enable --now docker && sudo usermod -aG docker ${EC2_USER} && ARCH=\$(uname -m) && case \"\$ARCH\" in x86_64) U=https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip;; aarch64) U=https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip;; *) echo \"Unsupported architecture: \$ARCH\" >&2; exit 1;; esac && curl -fsSL \"\$U\" -o /tmp/awscliv2.zip && unzip -oq /tmp/awscliv2.zip -d /tmp && (command -v aws >/dev/null 2>&1 && sudo /tmp/aws/install --update || sudo /tmp/aws/install) && rm -rf /tmp/aws /tmp/awscliv2.zip"

          # Pass AWS credentials to the EC2 instance
          echo "Passing AWS credentials to EC2 instance..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem "${EC2_USER}@${EC2_HOST}" "export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID} && export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY} && export AWS_REGION=${AWS_REGION} && aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY"

          # Pull the latest Docker image on the EC2 instance
          echo "Pulling the latest Docker image on EC2 instance..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem "${EC2_USER}@${EC2_HOST}" "docker pull $ECR_REPOSITORY:$IMAGE_TAG"

          # Stop and remove the old container
          echo "Stopping and removing the old container..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem "${EC2_USER}@${EC2_HOST}" "docker stop my-portfolio || true && docker rm my-portfolio || true"

          # Run the new container
          echo "Running the new container..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem "${EC2_USER}@${EC2_HOST}" "docker run -d -p 80:80 --name my-portfolio $ECR_REPOSITORY:$IMAGE_TAG"