name: Build and Deploy to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}

      # Deploys to bucket root: https://my-portfolio-av.s3.eu-north-1.amazonaws.com/index.html
      - name: Sync to S3
        run: |
          if [ -n "${{ vars.S3_PREFIX }}" ]; then
            S3_PATH="s3://${{ vars.S3_BUCKET }}/${{ vars.S3_PREFIX }}/"
          else
            S3_PATH="s3://${{ vars.S3_BUCKET }}/"
          fi
          aws s3 sync dist/ "$S3_PATH" --delete --cache-control "public, max-age=31536000" --exclude "index.html"
          aws s3 cp dist/index.html "${S3_PATH}index.html" --cache-control "no-cache, no-store, must-revalidate"
